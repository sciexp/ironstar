name: "Nix CI"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug logging"
        type: boolean
        default: false
      deploy_enabled:
        description: "Enable deployment"
        type: boolean
        default: false

concurrency:
  group: nix-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write

jobs:
  set-variables:
    runs-on: ubuntu-latest
    outputs:
      debug: ${{ steps.vars.outputs.debug }}
      skip_ci: ${{ steps.vars.outputs.skip_ci }}
      deploy_enabled: ${{ steps.vars.outputs.deploy_enabled }}
      deploy_environment: ${{ steps.vars.outputs.deploy_environment }}
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
      checkout_rev: ${{ steps.vars.outputs.checkout_rev }}
    steps:
      - name: Compute CI variables
        id: vars
        run: |
          # debug: from workflow_dispatch input or false
          echo "debug=${{ inputs.debug_enabled || false }}" >> "$GITHUB_OUTPUT"

          # skip_ci: true if PR has skip-ci label
          SKIP_CI=false
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"skip-ci"'; then
              SKIP_CI=true
            fi
          fi
          echo "skip_ci=${SKIP_CI}" >> "$GITHUB_OUTPUT"

          # deploy_enabled: push to main, PR with docs-preview label, or workflow_dispatch input
          DEPLOY_ENABLED=false
          if [[ '${{ github.event_name }}' == 'push' && '${{ github.ref }}' == 'refs/heads/main' ]]; then
            DEPLOY_ENABLED=true
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"docs-preview"'; then
              DEPLOY_ENABLED=true
            fi
          elif [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            DEPLOY_ENABLED=${{ inputs.deploy_enabled || false }}
          fi
          echo "deploy_enabled=${DEPLOY_ENABLED}" >> "$GITHUB_OUTPUT"

          # deploy_environment: production for push to main, preview otherwise
          DEPLOY_ENV=preview
          if [[ '${{ github.event_name }}' == 'push' && '${{ github.ref }}' == 'refs/heads/main' ]]; then
            DEPLOY_ENV=production
          fi
          echo "deploy_environment=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"

          # checkout_ref: head_ref for PRs, ref_name for pushes
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            echo "checkout_ref=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

          # checkout_rev: PR head SHA for PRs, github.sha for pushes
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            echo "checkout_rev=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_rev=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: full
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Validate flake structure
        run: nix flake show --json --accept-flake-config > /dev/null

      - name: Run flake checks
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run .#nix-fast-build -- \
            --no-nom \
            --skip-cached \
            --no-link \
            --max-jobs 2 \
            --option accept-flake-config true \
            --flake ".#checks.x86_64-linux" \
            --cachix-cache ${{ vars.CACHIX_CACHE_NAME }} \
            --result-format junit \
            --result-file nix-checks.xml
        timeout-minutes: 45

      - name: Publish check report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: nix-checks.xml
          check_name: Nix Checks
          include_passed: true
          detailed_summary: true

      - name: Upload check results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nix-check-results
          path: nix-checks.xml
          retention-days: 7

      - name: Report disk usage
        if: always()
        run: df -h

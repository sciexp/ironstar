name: "Nix CI"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: nix-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: full
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Validate flake structure
        run: nix flake show --json --accept-flake-config > /dev/null

      - name: Run flake checks
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run .#nix-fast-build -- \
            --no-nom \
            --skip-cached \
            --no-link \
            --option accept-flake-config true \
            --flake ".#checks" \
            --cachix-cache ${{ vars.CACHIX_CACHE_NAME }}
        timeout-minutes: 45

      - name: Report disk usage
        if: always()
        run: df -h

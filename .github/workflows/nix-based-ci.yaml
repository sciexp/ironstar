name: "Nix CI"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug logging"
        type: boolean
        default: false
      deploy_enabled:
        description: "Enable deployment"
        type: boolean
        default: false

concurrency:
  group: nix-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write     # preview-release-version, production-release-packages
  checks: write       # nix-check JUnit report
  deployments: write  # preview-site-deploy, production-site-deploy
  id-token: write     # production-release-packages

jobs:
  set-variables:
    runs-on: ubuntu-latest
    outputs:
      debug: ${{ steps.vars.outputs.debug }}
      skip_ci: ${{ steps.vars.outputs.skip_ci }}
      deploy_enabled: ${{ steps.vars.outputs.deploy_enabled }}
      deploy_environment: ${{ steps.vars.outputs.deploy_environment }}
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
      checkout_rev: ${{ steps.vars.outputs.checkout_rev }}
    steps:
      - name: Compute CI variables
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          INPUT_DEBUG: ${{ inputs.debug_enabled || false }}
          INPUT_DEPLOY: ${{ inputs.deploy_enabled || false }}
        run: |
          # debug: from workflow_dispatch input or false
          echo "debug=${INPUT_DEBUG}" >> "$GITHUB_OUTPUT"

          # skip_ci: true if PR has skip-ci label
          SKIP_CI=false
          if [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            if echo "${PR_LABELS}" | grep -q '"skip-ci"'; then
              SKIP_CI=true
            fi
          fi
          echo "skip_ci=${SKIP_CI}" >> "$GITHUB_OUTPUT"

          # deploy_enabled: push to main, PR with docs-preview label, or workflow_dispatch input
          DEPLOY_ENABLED=false
          if [[ "${EVENT_NAME}" == 'push' && "${GIT_REF}" == 'refs/heads/main' ]]; then
            DEPLOY_ENABLED=true
          elif [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            if echo "${PR_LABELS}" | grep -q '"docs-preview"'; then
              DEPLOY_ENABLED=true
            fi
          elif [[ "${EVENT_NAME}" == 'workflow_dispatch' ]]; then
            DEPLOY_ENABLED=${INPUT_DEPLOY}
          fi
          echo "deploy_enabled=${DEPLOY_ENABLED}" >> "$GITHUB_OUTPUT"

          # deploy_environment: production for push to main, preview otherwise
          DEPLOY_ENV=preview
          if [[ "${EVENT_NAME}" == 'push' && "${GIT_REF}" == 'refs/heads/main' ]]; then
            DEPLOY_ENV=production
          fi
          echo "deploy_environment=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"

          # checkout_ref: head_ref for PRs, ref_name for pushes
          if [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            echo "checkout_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

          # checkout_rev: PR head SHA for PRs, github.sha for pushes
          if [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            echo "checkout_rev=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_rev=${PUSH_SHA}" >> "$GITHUB_OUTPUT"
          fi

  nix-check:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          # - system: aarch64-linux
          #   runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: full
          system: ${{ matrix.system }}
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Validate flake structure
        run: nix flake show --json --accept-flake-config > /dev/null

      - name: Run flake checks
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run .#nix-fast-build -- \
            --no-nom \
            --skip-cached \
            --no-link \
            --max-jobs 2 \
            --option accept-flake-config true \
            --flake ".#checks.${{ matrix.system }}" \
            --cachix-cache ${{ vars.CACHIX_CACHE_NAME }} \
            --result-format junit \
            --result-file nix-checks.xml
        timeout-minutes: 45

      - name: Publish check report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: nix-checks.xml
          check_name: Nix Checks
          include_passed: true
          detailed_summary: true

      - name: Upload check results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nix-check-results
          path: nix-checks.xml
          retention-days: 7

      - name: Report disk usage
        if: always()
        run: df -h

  bootstrap-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check execution cache
        id: cache
        uses: ./.github/actions/cached-ci-job
        with:
          check-name: ${{ github.job }}
          hash-sources: 'scripts/bootstrap.sh Makefile .envrc .github/actions/setup-nix/action.yml'

      - name: Test bootstrap.sh --help
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "Testing --help flag..."
          bash scripts/bootstrap.sh --help

      - name: Test bootstrap.sh --version
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "Testing --version flag..."
          bash scripts/bootstrap.sh --version

      - name: Test bootstrap.sh --dry-run (local)
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "Testing --dry-run mode (local script)..."
          bash scripts/bootstrap.sh --dry-run --yes

      - name: Test bootstrap.sh one-liner (remote curl)
        if: steps.cache.outputs.should-run == 'true'
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/scripts/bootstrap.sh"
          echo "Testing remote one-liner pattern..."
          echo "URL: ${URL}"
          echo ""
          bash <(curl --proto '=https' --tlsv1.2 -sSf "${URL}") --dry-run --yes

      - name: Run bootstrap.sh (actual installation)
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "Running bootstrap script..."
          bash scripts/bootstrap.sh --yes

      - name: Verify nix installed
        if: steps.cache.outputs.should-run == 'true'
        run: |
          if ! command -v nix &> /dev/null; then
            echo "nix not found in PATH"
            exit 1
          fi
          echo "nix found at: $(command -v nix)"
          echo "nix store path: $(readlink -f "$(which nix)")"
          nix --version

      - name: Verify direnv configured
        if: steps.cache.outputs.should-run == 'true'
        run: |
          if ! command -v direnv &> /dev/null; then
            echo "direnv not found in PATH"
            exit 1
          fi
          echo "direnv found at: $(command -v direnv)"

      - name: Run make verify
        if: steps.cache.outputs.should-run == 'true'
        run: make verify

      - name: Verify age key generated
        if: steps.cache.outputs.should-run == 'true'
        run: |
          if [ ! -f ~/.config/sops/age/keys.txt ]; then
            echo "age key not generated"
            exit 1
          fi
          echo "age key generated successfully"
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh && \
          nix shell nixpkgs#age -c age-keygen -y ~/.config/sops/age/keys.txt

      - name: Create job result marker
        if: success() && steps.cache.outputs.should-run == 'true' && steps.cache.outputs.cache-source == 'none'
        shell: bash
        run: |
          mkdir -p "${{ steps.cache.outputs.cache-path }}"
          cat > "${{ steps.cache.outputs.cache-path }}/marker" <<EOF
          {
            "success": true,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Save execution cache
        if: success() && steps.cache.outputs.should-run == 'true' && steps.cache.outputs.cache-source == 'none'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ steps.cache.outputs.cache-path }}
          key: ${{ steps.cache.outputs.cache-key }}

  preview-release-version:
    needs: [set-variables, nix-check]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        package:
          - {name: docs, path: packages/docs}
          - {name: eventcatalog, path: packages/eventcatalog}
    runs-on: ubuntu-latest
    # semantic-release verifyAuth requires push permission even in dry-run mode
    # https://github.com/semantic-release/semantic-release/blob/v25.0.1/index.js#L87-L98
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch target branch for preview
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Configure git identity for temporary commits
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux

      - name: Install dependencies
        run: nix develop -c bun install

      - name: Preview version for ${{ matrix.package.name }}
        run: |
          echo "::group::Preview semantic-release version"
          OUTPUT=$(nix develop --accept-flake-config -c just preview-version main ${{ matrix.package.path }} 2>&1 | tee /dev/stderr)
          echo "::endgroup::"

          # Extract and annotate the next version (grep returns 1 on no match, so suppress with || true)
          VERSION=$(echo "$OUTPUT" | grep "next version:" | awk '{print $3}') || true
          if [ -n "$VERSION" ]; then
            echo "::notice title=Next Version (${{ matrix.package.name }})::$VERSION"
          else
            echo "::notice title=Next Version (${{ matrix.package.name }})::No release pending"
          fi

  preview-site-deploy:
    needs: [set-variables, nix-check]
    if: "!cancelled() && github.event_name == 'pull_request'"
    strategy:
      fail-fast: false
      matrix:
        site: [docs, eventcatalog]
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy-site.yaml
    with:
      site_name: ${{ matrix.site }}
      branch: ${{ github.head_ref }}
      environment: preview
      debug_enabled: ${{ needs.set-variables.outputs.debug }}
    secrets: inherit

  # Production release: structurally complete but INERT (no push: trigger exists)
  production-release-packages:
    needs: [set-variables, nix-check]
    if: >-
      github.repository_owner == 'sciexp' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') &&
      needs.set-variables.outputs.skip_ci != 'true'
    strategy:
      fail-fast: false
      matrix:
        package:
          - {name: docs, path: packages/docs}
          - {name: eventcatalog, path: packages/eventcatalog}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/package-release.yaml
    with:
      package-path: ${{ matrix.package.path }}
      package-name: ${{ matrix.package.name }}
      release-dry-run: false
      debug-enabled: ${{ needs.set-variables.outputs.debug == 'true' }}
      checkout-ref: ${{ needs.set-variables.outputs.checkout_ref }}
    secrets:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

  # Production deploy: structurally complete but INERT (no push: trigger exists)
  production-site-deploy:
    needs: [set-variables, nix-check, production-release-packages]
    if: >-
      !cancelled() &&
      needs.set-variables.outputs.skip_ci != 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') &&
      needs.set-variables.outputs.deploy_enabled == 'true'
    strategy:
      fail-fast: false
      matrix:
        site: [docs, eventcatalog]
    uses: ./.github/workflows/deploy-site.yaml
    with:
      site_name: ${{ matrix.site }}
      branch: ${{ needs.set-variables.outputs.checkout_ref }}
      environment: production
      debug_enabled: ${{ needs.set-variables.outputs.debug }}
    secrets: inherit

  # Placeholder for future Rust binary releases.
  # Disabled by default via repository variable; set ENABLE_RUST_RELEASE=true to activate.
  binary-build:
    needs: [nix-check]
    if: vars.ENABLE_RUST_RELEASE == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: full
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Build release binary
        run: nix build .#ironstar-release --accept-flake-config -L

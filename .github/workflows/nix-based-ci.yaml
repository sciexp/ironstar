name: "Nix CI"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: nix-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: full
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Validate flake structure
        run: nix flake show --json --accept-flake-config > /dev/null

      - name: Run flake checks
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run .#nix-fast-build -- \
            --no-nom \
            --skip-cached \
            --no-link \
            --max-jobs 2 \
            --option accept-flake-config true \
            --flake ".#checks.x86_64-linux" \
            --cachix-cache ${{ vars.CACHIX_CACHE_NAME }} \
            --result-format junit \
            --result-file nix-checks.xml
        timeout-minutes: 45

      - name: Publish check report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: nix-checks.xml
          check_name: Nix Checks
          include_passed: true
          detailed_summary: true

      - name: Upload check results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nix-check-results
          path: nix-checks.xml
          retention-days: 7

      - name: Report disk usage
        if: always()
        run: df -h
